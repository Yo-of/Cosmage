<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div class="wrapper">
        <header>
            <h1>🪐 Cosmic Age Calculator</h1>
            <p>How old would you be in other planets?</p>
            <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">🌙</button>
        </header>

        <div class="input-section">
            <label for="dob">Your Birthdate</label>
            <input type="date" id="dob" />
        </div>

        <div class="planet-grid">
            <button class="planet-btn active" data-planet="earth" onclick="selectPlanet(this)"><span class="planet-icon">🌍</span>Earth</button>
            <button class="planet-btn" data-planet="mercury" onclick="selectPlanet(this)"><span class="planet-icon">☿</span>Mercury</button>
            <button class="planet-btn" data-planet="venus" onclick="selectPlanet(this)"><span class="planet-icon">♀</span>Venus</button>
            <button class="planet-btn" data-planet="mars" onclick="selectPlanet(this)"><span class="planet-icon">♂</span>Mars</button>
            <button class="planet-btn" data-planet="jupiter" onclick="selectPlanet(this)"><span class="planet-icon">♃</span>Jupiter</button>
            <button class="planet-btn" data-planet="saturn" onclick="selectPlanet(this)"><span class="planet-icon">♄</span>Saturn</button>
            <button class="planet-btn" data-planet="uranus" onclick="selectPlanet(this)"><span class="planet-icon">⛢</span>Uranus</button>
            <button class="planet-btn" data-planet="neptune" onclick="selectPlanet(this)"><span class="planet-icon">♆</span>Neptune</button>
            <button class="planet-btn" data-planet="pluto" onclick="selectPlanet(this)"><span class="planet-icon">⯓</span>Pluto</button>
            <button class="planet-btn" data-planet="sun" onclick="selectPlanet(this)"><span class="planet-icon">☀</span>Sun</button>
        </div>

        <div id="results-area">
            <div class="empty-state">Enter your birthdate to dive into your cosmic journey.</div>
        </div>
    </div>  


    <script src="script.js"></script>
</body>
</html>
